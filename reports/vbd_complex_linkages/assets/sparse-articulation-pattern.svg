<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Sparse VBD articulation matrix construction</title>
  <desc id="desc">A joint graph maps to a symmetric six by six block Hessian. Joint edges create off-diagonal blocks, contacts add right-hand-side terms and diagonal curvature, and symbolic Cholesky introduces static fill blocks.</desc>
  <defs>
    <style>
      .title{font:700 30px Inter,ui-sans-serif,system-ui,sans-serif;fill:#26312f}.head{font:700 20px Inter,ui-sans-serif,system-ui,sans-serif;fill:#26312f}.label{font:600 15px Inter,ui-sans-serif,system-ui,sans-serif;fill:#45514e}.body{font:400 15px Inter,ui-sans-serif,system-ui,sans-serif;fill:#687471}.small{font:400 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#687471}.node{fill:#fff;stroke:#596562;stroke-width:2}.joint{stroke:#28795b;stroke-width:5;stroke-linecap:round}.closure{stroke:#b56a2a;stroke-width:5;stroke-linecap:round}.contact{stroke:#24647a;stroke-width:4;stroke-linecap:round}.grid{fill:#fff;stroke:#d8dfdc;stroke-width:1}.diag{fill:#28795b}.edge{fill:#8fc4ad}.fill{fill:#e6ad72}.contactBlock{fill:none;stroke:#24647a;stroke-width:4}.flow{fill:#eef2f0;stroke:#d8dfdc;stroke-width:1.5}.arrow{stroke:#87918e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#87918e"/></marker>
    <g id="matrix-grid">
      <rect class="grid" x="0" y="0" width="32" height="32"/><rect class="grid" x="32" y="0" width="32" height="32"/><rect class="grid" x="64" y="0" width="32" height="32"/><rect class="grid" x="96" y="0" width="32" height="32"/><rect class="grid" x="128" y="0" width="32" height="32"/><rect class="grid" x="160" y="0" width="32" height="32"/><rect class="grid" x="192" y="0" width="32" height="32"/><rect class="grid" x="224" y="0" width="32" height="32"/>
      <rect class="grid" x="0" y="32" width="32" height="32"/><rect class="grid" x="32" y="32" width="32" height="32"/><rect class="grid" x="64" y="32" width="32" height="32"/><rect class="grid" x="96" y="32" width="32" height="32"/><rect class="grid" x="128" y="32" width="32" height="32"/><rect class="grid" x="160" y="32" width="32" height="32"/><rect class="grid" x="192" y="32" width="32" height="32"/><rect class="grid" x="224" y="32" width="32" height="32"/>
      <rect class="grid" x="0" y="64" width="32" height="32"/><rect class="grid" x="32" y="64" width="32" height="32"/><rect class="grid" x="64" y="64" width="32" height="32"/><rect class="grid" x="96" y="64" width="32" height="32"/><rect class="grid" x="128" y="64" width="32" height="32"/><rect class="grid" x="160" y="64" width="32" height="32"/><rect class="grid" x="192" y="64" width="32" height="32"/><rect class="grid" x="224" y="64" width="32" height="32"/>
      <rect class="grid" x="0" y="96" width="32" height="32"/><rect class="grid" x="32" y="96" width="32" height="32"/><rect class="grid" x="64" y="96" width="32" height="32"/><rect class="grid" x="96" y="96" width="32" height="32"/><rect class="grid" x="128" y="96" width="32" height="32"/><rect class="grid" x="160" y="96" width="32" height="32"/><rect class="grid" x="192" y="96" width="32" height="32"/><rect class="grid" x="224" y="96" width="32" height="32"/>
      <rect class="grid" x="0" y="128" width="32" height="32"/><rect class="grid" x="32" y="128" width="32" height="32"/><rect class="grid" x="64" y="128" width="32" height="32"/><rect class="grid" x="96" y="128" width="32" height="32"/><rect class="grid" x="128" y="128" width="32" height="32"/><rect class="grid" x="160" y="128" width="32" height="32"/><rect class="grid" x="192" y="128" width="32" height="32"/><rect class="grid" x="224" y="128" width="32" height="32"/>
      <rect class="grid" x="0" y="160" width="32" height="32"/><rect class="grid" x="32" y="160" width="32" height="32"/><rect class="grid" x="64" y="160" width="32" height="32"/><rect class="grid" x="96" y="160" width="32" height="32"/><rect class="grid" x="128" y="160" width="32" height="32"/><rect class="grid" x="160" y="160" width="32" height="32"/><rect class="grid" x="192" y="160" width="32" height="32"/><rect class="grid" x="224" y="160" width="32" height="32"/>
      <rect class="grid" x="0" y="192" width="32" height="32"/><rect class="grid" x="32" y="192" width="32" height="32"/><rect class="grid" x="64" y="192" width="32" height="32"/><rect class="grid" x="96" y="192" width="32" height="32"/><rect class="grid" x="128" y="192" width="32" height="32"/><rect class="grid" x="160" y="192" width="32" height="32"/><rect class="grid" x="192" y="192" width="32" height="32"/><rect class="grid" x="224" y="192" width="32" height="32"/>
      <rect class="grid" x="0" y="224" width="32" height="32"/><rect class="grid" x="32" y="224" width="32" height="32"/><rect class="grid" x="64" y="224" width="32" height="32"/><rect class="grid" x="96" y="224" width="32" height="32"/><rect class="grid" x="128" y="224" width="32" height="32"/><rect class="grid" x="160" y="224" width="32" height="32"/><rect class="grid" x="192" y="224" width="32" height="32"/><rect class="grid" x="224" y="224" width="32" height="32"/>
    </g>
  </defs>

  <rect width="1440" height="720" fill="#f7f8f7"/>
  <text class="title" x="60" y="58">From articulation graph to sparse Newton solve</text>

  <text class="head" x="75" y="115">1. Static joint graph</text>
  <line class="joint" x1="115" y1="240" x2="205" y2="175"/><line class="joint" x1="205" y1="175" x2="300" y2="215"/><line class="joint" x1="300" y1="215" x2="390" y2="160"/><line class="joint" x1="390" y1="160" x2="455" y2="245"/>
  <line class="joint" x1="205" y1="175" x2="225" y2="310"/><line class="joint" x1="225" y1="310" x2="335" y2="335"/><line class="joint" x1="335" y1="335" x2="455" y2="245"/>
  <line class="joint" x1="390" y1="160" x2="455" y2="105"/>
  <line class="closure" x1="300" y1="215" x2="335" y2="335"/>
  <line class="contact" x1="225" y1="385" x2="225" y2="340"/><line class="contact" x1="455" y1="320" x2="455" y2="275"/>
  <circle class="node" cx="115" cy="240" r="22"/><circle class="node" cx="205" cy="175" r="22"/><circle class="node" cx="300" cy="215" r="22"/><circle class="node" cx="390" cy="160" r="22"/><circle class="node" cx="455" cy="245" r="22"/><circle class="node" cx="225" cy="310" r="22"/><circle class="node" cx="335" cy="335" r="22"/><circle class="node" cx="455" cy="105" r="22"/>
  <text class="label" x="115" y="246" text-anchor="middle">0</text><text class="label" x="205" y="181" text-anchor="middle">1</text><text class="label" x="300" y="221" text-anchor="middle">2</text><text class="label" x="390" y="166" text-anchor="middle">3</text><text class="label" x="455" y="251" text-anchor="middle">4</text><text class="label" x="225" y="316" text-anchor="middle">5</text><text class="label" x="335" y="341" text-anchor="middle">6</text><text class="label" x="455" y="111" text-anchor="middle">7</text>
  <text class="small" x="295" y="376" text-anchor="middle">orange: loop-closure joint</text><text class="small" x="295" y="398" text-anchor="middle">blue: dynamic contact</text>

  <path class="arrow" d="M485 250 H535"/>
  <text class="head" x="555" y="115">2. Block Hessian H</text>
  <text class="small" x="555" y="140">each cell is 6x6</text>
  <g transform="translate(565 165)">
    <use href="#matrix-grid"/>
    <rect class="diag" x="0" y="0" width="32" height="32"/><rect class="diag" x="32" y="32" width="32" height="32"/><rect class="diag" x="64" y="64" width="32" height="32"/><rect class="diag" x="96" y="96" width="32" height="32"/><rect class="diag" x="128" y="128" width="32" height="32"/><rect class="diag" x="160" y="160" width="32" height="32"/><rect class="diag" x="192" y="192" width="32" height="32"/><rect class="diag" x="224" y="224" width="32" height="32"/>
    <rect class="edge" x="32" y="0" width="32" height="32"/><rect class="edge" x="0" y="32" width="32" height="32"/><rect class="edge" x="64" y="32" width="32" height="32"/><rect class="edge" x="32" y="64" width="32" height="32"/><rect class="edge" x="96" y="64" width="32" height="32"/><rect class="edge" x="64" y="96" width="32" height="32"/><rect class="edge" x="128" y="96" width="32" height="32"/><rect class="edge" x="96" y="128" width="32" height="32"/><rect class="edge" x="160" y="32" width="32" height="32"/><rect class="edge" x="32" y="160" width="32" height="32"/><rect class="edge" x="192" y="160" width="32" height="32"/><rect class="edge" x="160" y="192" width="32" height="32"/><rect class="edge" x="224" y="128" width="32" height="32"/><rect class="edge" x="128" y="224" width="32" height="32"/>
    <rect class="edge" x="192" y="64" width="32" height="32"/><rect class="edge" x="64" y="192" width="32" height="32"/>
    <rect class="contactBlock" x="160" y="160" width="32" height="32"/><rect class="contactBlock" x="224" y="224" width="32" height="32"/>
  </g>
  <text class="small" x="693" y="448" text-anchor="middle">joint edges create symmetric off-diagonal blocks</text>
  <text class="small" x="693" y="470" text-anchor="middle">contacts modify g and outlined diagonal blocks only</text>

  <path class="arrow" d="M850 250 H900"/>
  <text class="head" x="920" y="115">3. Symbolic Cholesky L</text>
  <text class="small" x="920" y="140">minimum-degree order; static fill</text>
  <g transform="translate(930 165)">
    <use href="#matrix-grid"/>
    <rect class="diag" x="0" y="0" width="32" height="32"/><rect class="diag" x="32" y="32" width="32" height="32"/><rect class="diag" x="64" y="64" width="32" height="32"/><rect class="diag" x="96" y="96" width="32" height="32"/><rect class="diag" x="128" y="128" width="32" height="32"/><rect class="diag" x="160" y="160" width="32" height="32"/><rect class="diag" x="192" y="192" width="32" height="32"/><rect class="diag" x="224" y="224" width="32" height="32"/>
    <rect class="edge" x="0" y="32" width="32" height="32"/><rect class="edge" x="32" y="64" width="32" height="32"/><rect class="edge" x="64" y="96" width="32" height="32"/><rect class="edge" x="96" y="128" width="32" height="32"/><rect class="edge" x="32" y="160" width="32" height="32"/><rect class="edge" x="160" y="192" width="32" height="32"/><rect class="edge" x="128" y="224" width="32" height="32"/><rect class="edge" x="64" y="192" width="32" height="32"/>
    <rect class="fill" x="96" y="192" width="32" height="32"/><rect class="fill" x="128" y="192" width="32" height="32"/><rect class="fill" x="64" y="224" width="32" height="32"/><rect class="fill" x="96" y="224" width="32" height="32"/><rect class="fill" x="160" y="224" width="32" height="32"/><rect class="fill" x="192" y="224" width="32" height="32"/>
  </g>
  <text class="small" x="1058" y="448" text-anchor="middle">green: original joint blocks</text><text class="small" x="1058" y="470" text-anchor="middle">orange: fill known at model finalization</text>

  <g transform="translate(60 535)">
    <rect class="flow" x="0" y="0" width="205" height="74" rx="6"/><text class="label" x="102" y="30" text-anchor="middle">Model finalization</text><text class="small" x="102" y="53" text-anchor="middle">group bodies + joints</text>
    <path class="arrow" d="M215 37 H260"/>
    <rect class="flow" x="270" y="0" width="205" height="74" rx="6"/><text class="label" x="372" y="30" text-anchor="middle">Symbolic analysis</text><text class="small" x="372" y="53" text-anchor="middle">order + fill + Schur slots</text>
    <path class="arrow" d="M485 37 H530"/>
    <rect class="flow" x="540" y="0" width="205" height="74" rx="6"/><text class="label" x="642" y="30" text-anchor="middle">Per VBD iteration</text><text class="small" x="642" y="53" text-anchor="middle">assemble H and -g</text>
    <path class="arrow" d="M755 37 H800"/>
    <rect class="flow" x="810" y="0" width="205" height="74" rx="6"/><text class="label" x="912" y="30" text-anchor="middle">Numeric solve</text><text class="small" x="912" y="53" text-anchor="middle">block Cholesky + substitutions</text>
    <path class="arrow" d="M1025 37 H1070"/>
    <rect class="flow" x="1080" y="0" width="240" height="74" rx="6"/><text class="label" x="1200" y="30" text-anchor="middle">Pose update</text><text class="small" x="1200" y="53" text-anchor="middle">q ← q ⊕ α Δx</text>
  </g>
  <text class="small" x="60" y="670">The dynamic contact graph never changes the off-diagonal factor pattern.</text>
</svg>
