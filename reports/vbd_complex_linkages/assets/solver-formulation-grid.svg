<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Solver formulation map</title>
  <desc id="desc">A two by two matrix classifying MuJoCo, VBD sparse direct, FPGS, and Kamino by reduced versus maximal coordinates and primal versus dual solve variables.</desc>
  <defs>
    <style>
      .title { fill: #26312f; font: 700 38px Inter, ui-sans-serif, system-ui, sans-serif; }
      .subtitle { fill: #687471; font: 400 19px Inter, ui-sans-serif, system-ui, sans-serif; }
      .eyebrow { fill: #7a8582; font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 1.8px; }
      .column { fill: #26312f; font: 650 23px Inter, ui-sans-serif, system-ui, sans-serif; }
      .column-sub { fill: #7a8582; font: 400 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .row { fill: #26312f; font: 700 22px Inter, ui-sans-serif, system-ui, sans-serif; }
      .row-sub { fill: #7a8582; font: 400 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .solver { fill: #26312f; font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; }
      .kind { fill: #596562; font: 600 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .body { fill: #687471; font: 400 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tag { font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 1px; }
      .footer { fill: #7a8582; font: 400 16px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#26312f" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#f7f8f7"/>

  <text class="title" x="80" y="82">Solver formulation map</text>
  <text class="subtitle" x="80" y="118">Where the state lives, and which variables carry the solve</text>

  <text class="eyebrow" x="890" y="170" text-anchor="middle">COORDINATE REPRESENTATION</text>

  <g>
    <rect x="320" y="200" width="560" height="70" rx="8" fill="#eef2f0"/>
    <text class="column" x="600" y="232" text-anchor="middle">Reduced coordinates</text>
    <text class="column-sub" x="600" y="255" text-anchor="middle">joint / generalized state</text>

    <rect x="900" y="200" width="560" height="70" rx="8" fill="#eef2f0"/>
    <text class="column" x="1180" y="232" text-anchor="middle">Maximal coordinates</text>
    <text class="column-sub" x="1180" y="255" text-anchor="middle">independent body poses</text>
  </g>

  <g>
    <rect x="80" y="300" width="200" height="260" rx="8" fill="#eef2f0"/>
    <text class="eyebrow" x="180" y="392" text-anchor="middle">SOLVE VARIABLES</text>
    <text class="row" x="180" y="434" text-anchor="middle">Primal</text>
    <text class="row-sub" x="180" y="462" text-anchor="middle">positions and</text>
    <text class="row-sub" x="180" y="483" text-anchor="middle">pose increments</text>

    <rect x="80" y="580" width="200" height="260" rx="8" fill="#eef2f0"/>
    <text class="eyebrow" x="180" y="664" text-anchor="middle">SOLVE VARIABLES</text>
    <text class="row" x="180" y="706" text-anchor="middle">Dual</text>
    <text class="row-sub" x="180" y="734" text-anchor="middle">or primal-dual</text>
    <text class="row-sub" x="180" y="763" text-anchor="middle">constraint variables</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="300" width="560" height="260" rx="8" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
    <rect x="320" y="300" width="7" height="260" rx="3" fill="#24647a"/>
    <text class="solver" x="368" y="365">MuJoCo</text>
    <text class="kind" x="368" y="405">Reduced-coordinate primal dynamics</text>
    <text class="body" x="368" y="456">
      <tspan x="368" dy="0">State and Newton step live in generalized</tspan>
      <tspan x="368" dy="27">coordinates q.</tspan>
    </text>
    <rect x="368" y="515" width="200" height="28" rx="4" fill="#e4f0f4"/>
    <text class="tag" x="468" y="534" text-anchor="middle" fill="#24647a">TREE ARTICULATIONS</text>

    <rect x="900" y="300" width="560" height="260" rx="8" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
    <rect x="900" y="300" width="7" height="260" rx="3" fill="#28795b"/>
    <text class="solver" x="948" y="365">VBD sparse direct</text>
    <text class="kind" x="948" y="405">Maximal-coordinate primal dynamics</text>
    <text class="body" x="948" y="456">
      <tspan x="948" dy="0">Newton solves body-pose increments through</tspan>
      <tspan x="948" dy="27">a sparse 6x6 block system.</tspan>
    </text>
    <rect x="948" y="515" width="150" height="28" rx="4" fill="#e4f1eb"/>
    <text class="tag" x="1023" y="534" text-anchor="middle" fill="#28795b">CLOSED LOOPS</text>

    <rect x="320" y="580" width="560" height="260" rx="8" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
    <rect x="320" y="580" width="7" height="260" rx="3" fill="#8a6a2f"/>
    <text class="solver" x="368" y="645">FPGS</text>
    <text class="kind" x="368" y="685">Reduced articulation + dual contact solve</text>
    <text class="body" x="368" y="736">
      <tspan x="368" dy="0">Articulation dynamics use reduced coordinates;</tspan>
      <tspan x="368" dy="27">hard contacts use a Gauss-Seidel solve.</tspan>
    </text>
    <rect x="368" y="795" width="154" height="28" rx="4" fill="#f3eee2"/>
    <text class="tag" x="445" y="814" text-anchor="middle" fill="#8a6a2f">HARD CONTACTS</text>

    <rect x="900" y="580" width="560" height="260" rx="8" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
    <rect x="900" y="580" width="7" height="260" rx="3" fill="#98533a"/>
    <text class="solver" x="948" y="645">Kamino</text>
    <text class="kind" x="948" y="685">Maximal-coordinate constrained dynamics</text>
    <text class="body" x="948" y="736">
      <tspan x="948" dy="0">Proximal-ADMM solves bilateral joints, limits,</tspan>
      <tspan x="948" dy="27">and contacts as an NCP.</tspan>
    </text>
    <rect x="948" y="795" width="186" height="28" rx="4" fill="#f4e9e5"/>
    <text class="tag" x="1041" y="814" text-anchor="middle" fill="#98533a">DUAL / PRIMAL-DUAL</text>
  </g>

  <line x1="320" y1="890" x2="1460" y2="890" stroke="#d8dfdc" stroke-width="2"/>
  <text class="footer" x="320" y="925">Dominant formulation shown. Contact and limit handling may mix primal and dual variables internally.</text>
</svg>
